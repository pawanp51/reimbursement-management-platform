info:
  name: Get User Transactions
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/transactions
  headers:
    Authorization: Bearer YOUR_USER_TOKEN_HERE
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: Response has transactions array
    assert: Array.isArray($res.body.data.transactions)
  - name: Each transaction has required fields
    assert: $res.body.data.transactions.every(t => t.id && t.status && t.description)
