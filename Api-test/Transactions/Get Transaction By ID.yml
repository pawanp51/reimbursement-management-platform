info:
  name: Get Transaction By ID
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3000/api/transactions/TRANSACTION_ID_HERE
  headers:
    Authorization: Bearer YOUR_USER_TOKEN_HERE
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: Response has transaction
    assert: $res.body.data.transaction != null
  - name: Transaction has approvals array
    assert: Array.isArray($res.body.data.transaction.approvals)
