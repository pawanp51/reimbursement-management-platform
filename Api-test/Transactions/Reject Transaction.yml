info:
  name: Reject Transaction
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:3000/api/transactions/TRANSACTION_ID_HERE/reject
  headers:
    Authorization: Bearer YOUR_APPROVER_TOKEN_HERE
  body:
    type: json
    data: |-
      {
        "comments": "This expense exceeds budget limit. Please submit with proper authorization."
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: Transaction status is REJECTED
    assert: $res.body.data.transaction.status == "REJECTED"
  - name: Approval marked as REJECTED
    assert: $res.body.data.transaction.approvals.some(a => a.status == "REJECTED")
  - name: Comments recorded
    assert: $res.body.data.transaction.approvals.some(a => a.comments.length > 0)
