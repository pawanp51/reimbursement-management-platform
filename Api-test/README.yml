docs: |-
  # Reimbursement Management Platform - API Testing Guide
  
  ## Authentication
  - All protected endpoints require `Authorization: Bearer {TOKEN}` header
  - Get token: Login via `/api/auth/login` or `/api/auth/signup`
  - Replace `YOUR_TOKEN_HERE` in requests with actual token
  
  ## User Roles
  - **ADMIN**: Full access, can create users, set approval rules
  - **MANAGER**: Can approve transactions, manage employees
  - **CTO/DIRECTOR**: Special approval roles
  - **EMPLOYEE**: Can create transactions only
  
  ## Quick Test Flow
  
  ### 1. Setup (Admin)
  ```
  POST /api/auth/add-user          - Create employee
  POST /api/approval-rules          - Define approval workflow
  ```
  
  ### 2. User Workflow
  ```
  POST   /api/transactions          - Create DRAFT transaction
  PUT    /api/transactions/{id}     - Edit DRAFT transaction
  POST   /api/transactions/{id}/submit - Submit for approval (→ WAITING_APPROVAL)
  GET    /api/transactions          - View own transactions
  ```
  
  ### 3. Approver Workflow
  ```
  GET    /api/transactions/approvals/pending          - See pending approvals
  GET    /api/transactions/{id}                       - View transaction details
  POST   /api/transactions/{id}/approve               - Approve
  POST   /api/transactions/{id}/reject                - Reject
  GET    /api/transactions/{id}/approvals/history     - See approval trail
  ```
  
  ## Transaction States
  - **DRAFT**: Only owner can edit/delete
  - **WAITING_APPROVAL**: Visible to approvers, cannot modify
  - **APPROVED**: Final state ✓
  - **REJECTED**: Final state ✗
  
  ## Approval Rules Logic
  
  ### Sequential Approval
  If `isApproversSequence: true`:
  - Person 1 must approve first
  - Person 2 can only approve after Person 1
  - And so on...
  
  ### Manager Approval Required
  If `isManagerApprover: true`:
  - Manager approval is required first
  - Other approvers proceed after manager
  
  ### CTO Quick Approval
  - If CTO role approves, entire transaction auto-approves
  - All pending approvals marked as APPROVED
  
  ### Minimal Approval Percentage
  - Calculates required approvals: `ceil(total_approvers × percentage / 100)`
  - Example: 4 approvers, 50% = needs 2 approvals
  - Transaction auto-changes to APPROVED when threshold met
  
  ## Common Issues & Fixes
  
  | Issue | Solution |
  |-------|----------|
  | Unauthorized 401 | Check token, refresh if expired |
  | Forbidden 403 | Check user role for endpoint |
  | Not found 404 | Verify transaction/approval ID |
  | Bad request 400 | Check required fields in body |
  | Can't submit - no approval rules | Admin must create approval rule first |
  | Can't approve - not in approvers | Check if user is in approval rule |
  | Rejection requires remarks | Always include comments in reject |
  
  ## Test Data Tips
  - Use same email format: `firstname.lastname@company.com`
  - Dates in YYYY-MM-DD format
  - Always include all required fields
  - Comments/remarks are optional in most cases
  
  ## Useful Queries
  
  Get all transactions (Admin):
  ```
  GET /api/transactions/admin/all-transactions?status=WAITING_APPROVAL
  GET /api/transactions/admin/all-transactions?userId=USER_ID
  ```
  
  Filter by status: DRAFT, WAITING_APPROVAL, APPROVED, REJECTED
