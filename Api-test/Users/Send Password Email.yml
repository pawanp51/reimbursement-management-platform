info:
  name: Send Password Email
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:3000/api/auth/send-password
  headers:
    Authorization: Bearer YOUR_ADMIN_TOKEN_HERE
  body:
    type: json
    data: |-
      {
        "userId": "USER_ID_HERE"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: Response message about email
    assert: $res.body.message.includes("sent")
