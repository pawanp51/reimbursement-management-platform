info:
  name: Add User (Admin)
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/auth/add-user
  headers:
    Authorization: Bearer YOUR_ADMIN_TOKEN_HERE
  body:
    type: json
    data: |-
      {
        "name": "John Doe",
        "email": "john.doe@company.com",
        "role": "EMPLOYEE",
        "managerId": "MANAGER_ID_HERE",
        "password": "SecurePassword@123"
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 201
    assert: $res.status == 201
  - name: User created
    assert: $res.body.data.user != null
  - name: Email matches
    assert: $res.body.data.user.email == "john.doe@company.com"
  - name: Role is EMPLOYEE
    assert: $res.body.data.user.role == "EMPLOYEE"
