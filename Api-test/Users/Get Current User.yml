info:
  name: Get Current User
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:3000/api/auth/me
  headers:
    Authorization: Bearer YOUR_TOKEN_HERE
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: User has email
    assert: $res.body.data.email != null
  - name: User has role
    assert: $res.body.data.role != null
