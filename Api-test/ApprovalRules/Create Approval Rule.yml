info:
  name: Create Approval Rule
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/approval-rules
  headers:
    Authorization: Bearer YOUR_ADMIN_TOKEN_HERE
  body:
    type: json
    data: |-
      {
        "userId": "USER_ID_HERE",
        "description": "Standard approval rule for employees",
        "isManagerApprover": true,
        "approversList": ["APPROVER_ID_1", "APPROVER_ID_2", "APPROVER_ID_3"],
        "isApproversSequence": false,
        "minimalApprovalPercentage": 50
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 201
    assert: $res.status == 201
  - name: Response has approvalRule
    assert: $res.body.data.approvalRule != null
  - name: Response has approvers
    assert: $res.body.data.approvalRule.approvers.length >= 3
