info:
  name: Get User Approval Rules
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:3000/api/approval-rules/user/USER_ID_HERE
  headers:
    Authorization: Bearer YOUR_ADMIN_TOKEN_HERE
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  - name: Status code is 200
    assert: $res.status == 200
  - name: Response has approvalRules array
    assert: Array.isArray($res.body.data.approvalRules)
